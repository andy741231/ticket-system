                  - paragraph [ref=f8e125]: Alejandra Fernandez, PhD, is an Assistant Professor in the Peter O' Donnell School of Public Health. Dr. Fernandez completed her undergraduate and master's program at Texas A&M University and her doctoral program at the University of Texas at Austin.
                  - paragraph [ref=f8e127]: "Currently, Dr. Fernandez is funded through a NIH NHLBI Mentored Research Scientist Career Development Award (K01) that address the high prevalence of obesity among Hispanic youth by examining multi-level factors that increase obesity risk behaviors using ecological momentary assessment methodology. The study has two main aims: 1) Conduct secondary data analysis using the Adolescent Brain Cognitive Development study to examine direct and moderating effects on the longitudinal trajectories of obesity risk behaviors and status; and 2) Pilot and implement an ecological momentary assessment protocol to assess the role of momentary changes in family functioning on physical activity, sleep, and nutrition among Hispanic adolescents."
