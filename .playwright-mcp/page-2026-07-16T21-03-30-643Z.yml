                      - text: ACADEMIC HONESTY POLICY High ethical standards are critical to the integrity of any institution, and bear directly on the ultimate value of conferred degrees. All UH community members are expected to contribute to an atmosphere of the highest possible ethical standards. Maintaining such an atmosphere requires that any instances of academic dishonesty be recognized and addressed. The
                      - link "UH Academic Honesty Policy" [ref=f5e333] [cursor=pointer]:
                        - /url: https://uh.edu/provost/policies-resources/honesty/
                      - text: "is designed to handle those instances with fairness to all parties involved: the students, the instructors, and the University itself. All students and faculty of the University of Houston are responsible for being familiar with this policy."
                    - paragraph [ref=f5e334]
                    - paragraph [ref=f5e335]: TITLE IX/SEXUAL MISCONDUCT
                    - paragraph [ref=f5e336]:
                      - generic [ref=f5e337]:
