                      - text: .
                    - paragraph [ref=f5e357]: I will use my best judgment in evaluating student absence requests
                    - paragraph [ref=f5e358]: .
                    - paragraph [ref=f5e359]: Students should submit an excused absence request in writing (email is fine) or by phone
                    - paragraph [ref=f5e360]: IF
                    - paragraph [ref=f5e361]: written or email communication is not possible.
                    - paragraph [ref=f5e362]: Planned absences should be submitted as soon as the conflict becomes known no later than 5 business days, if possible,
                    - paragraph [ref=f5e363]: BEFORE
                    - paragraph [ref=f5e364]: the anticipated absence.
                    - paragraph [ref=f5e365]: There are no exceptions to this rule.
                    - paragraph [ref=f5e366]: If there is an unforeseen circumstance, the student must notify the instructor
                    - paragraph [ref=f5e367]: BEFORE
                    - paragraph [ref=f5e368]: the next class meeting or as soon as possible with an explanation regarding why the notice could not be sent before the next class meeting.
                    - paragraph [ref=f5e369]: There are no exceptions to this rule.
                    - paragraph [ref=f5e370]: "Please submit all the documentation to support your request for excused absences, which may include but is not limited to:"
                    - paragraph [ref=f5e371]: Medical provider note with the date and time of the medical assessment, either of yourself or a family member or dependent, and the date at which the student may return to classes
                    - paragraph [ref=f5e372]: Death notice, obituary, or death certificate
                    - paragraph [ref=f5e373]: Documentation related to legal activities
                    - paragraph [ref=f5e374]: Confirmation of athletic participation
                    - paragraph [ref=f5e375]: Confirmation of mandatory interviews from employers
                    - paragraph [ref=f5e376]: Conference program
                    - paragraph [ref=f5e377]: Confirmation of participation in University-sponsored activity
                    - paragraph [ref=f5e378]: I
                    - paragraph [ref=f5e379]: will verify
                    - paragraph [ref=f5e380]: a student’s absence documentation or defer verification and decision, including cases when documentation is not available, to the college dean or dean’s designee.
                    - paragraph [ref=f5e381]: Providing false information or documentation is unacceptable. Allegations of misconduct will be referred for review and may be considered as prohibited conduct under the
                    - paragraph [ref=f5e382]:
                      - link "Student Code of Conduct" [ref=f5e383] [cursor=pointer]:
                        - /url: https://www.uh.edu/dos/behavior-conduct/student-code-of-conduct/
                    - paragraph [ref=f5e384]: or an act of academic dishonesty under the
                    - paragraph [ref=f5e385]:
                      - link "Academic Honesty Policy" [ref=f5e386] [cursor=pointer]:
                        - /url: http://publications.uh.edu/content.php?catoid=44&navoid=15831
                    - paragraph [ref=f5e387]: .
                    - paragraph [ref=f5e388]: You must submit your documentation for review
                    - paragraph [ref=f5e389]: within three business
                    - paragraph [ref=f5e390]: days
                    - paragraph [ref=f5e391]: of
                    - paragraph [ref=f5e392]: the notification. You will receive a decision
                    - paragraph [ref=f5e393]: "on"
                    - paragraph [ref=f5e394]: whether the excused absence is approved within
                    - paragraph [ref=f5e395]: three business days of receiving the proper documentation
                    - paragraph [ref=f5e396]: .
                    - paragraph [ref=f5e397]: You forgo your right
                    - paragraph [ref=f5e398]: to review your request if you do not submit the proper documentation within three business days after the notification.
                    - paragraph [ref=f5e399]: If and only if
                    - paragraph [ref=f5e400]: the absence is excused, I will provide you with an opportunity to make up the quiz, exam, or other work or provide you with a satisfactory alternative by a reasonable date.
