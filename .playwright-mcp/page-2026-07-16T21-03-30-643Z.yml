                  - paragraph [ref=f5e425]: Need Support Now?
                  - paragraph [ref=f5e426]:
                    - text: "If you or someone you know is struggling or in crisis, help is available. Call CAPS crisis support 24/7 at 713-743-5454, or the National Suicide and Crisis Lifeline: call or text"
