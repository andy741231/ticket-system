                  - paragraph [ref=f5e405]:
                    - text: RECORDING OF CLASS Students may not record all or part of class, livestream all or part of class, or make/distribute screen captures, without advanced written consent of the instructor. If you have or think you may have a disability such that you need to record class-related activities, please contact the
                    - link "Justin Dart, Jr. Student Accessibility Center" [ref=f5e406] [cursor=pointer]:
                      - /url: https://uh.edu/accessibility/
                    - text: . If you have an accommodation to record class-related activities, those recordings may not be shared with any other student, whether in this course or not, or with any other person or on any other platform. Classes may be recorded by the instructor. Students may use instructor’s recordings for their own studying and notetaking. Instructor’s recordings are not authorized to be shared with anyone without the prior written approval of the instructor. Failure to comply with requirements regarding recordings will result in a disciplinary referral to the Dean of Students Office and may result in disciplinary action.
