                    - paragraph [ref=f5e213]
                    - paragraph [ref=f5e214]: Quizzes will not be cumulative. The quizzes will cover materials from the lectures, readings, classroom discussions, and assigned activities, if applicable.
                    - paragraph [ref=f5e215]
                    - paragraph [ref=f5e216]: Online Exams/Quizzes (20%)
                    - paragraph [ref=f5e217]: "The Office of the General Counsel has recommended to make sure students are aware that: (1) students are permitted to take their online tests or quizzes in a computer lab or other open space; and (2) there is no requirement that a student use their own personal computer or that they complete exams and quizzes in any specific location (e.g., their home). The Office of the General Counsel has advised that students be made aware in advance that an environmental scan may be conducted as a part of an online exam."
                    - paragraph [ref=f5e218]
                    - paragraph [ref=f5e219]: Make-up exams/quizzes will not be granted unless it falls within UH's Excused Absence Policy. If granted, makeup exams will need to be scheduled with the instructor of the course.
                    - paragraph [ref=f5e220]
                    - paragraph [ref=f5e221]: "Assignment #1 – HIA Project Description Statement (20%)"
                    - paragraph [ref=f5e222]: Each student will present the population health policy or intervention that will be assessed using Health Impact Assessment methods. Include information on the affected population and/or community, incidence and prevalence data, and causal factors of the selected problem. A scoping matrix or table summarizing the health determinant, population affected, direction of impact, level of impact, data source(s), and method of assessment should be included as part of the statement. The use of artificial intelligence resources is prohibited. Any violation of this policy will result in a zero for the assignment. (3 pages including the scoping matrix/table, 1.5 line spacing, 11 pt. font, and 1-in margins). Due by October 15 at 11:59pm CT.
                    - paragraph [ref=f5e223]
                    - paragraph [ref=f5e224]: "Assignment #2 – Health Impact Assessment Presentation (20%)"
                    - paragraph [ref=f5e225]: Each student will have 3 minutes and one static slide (no animation) to present results from the Health Impact Assessment (HIA) conducted over the course of the course. Students will have opportunities to receive feedback that can be incorporated into the final presentation. Presentation order will be randomly assigned and class attendance will be collected.
                    - paragraph [ref=f5e226]
                    - paragraph [ref=f5e227]: "Assignment #3 – Health Impact Assessment Policy Brief (25%)"
                    - paragraph [ref=f5e228]: "Students will write a 2–3 page policy brief based on the results from the Health Impact Assessment (HIA) conducted over the course of the semester. The brief should clearly explain the issue, summarize key health impacts, highlight affected populations, and provide two to three specific policy recommendations to mitigate negative impacts or enhance positive ones. (Format rules: 3 pages maximum, 1.5 line spacing, 11pt. font, and 1-in margins). Due by December 3 at 11:59 pm CT."
                    - paragraph [ref=f5e229]
                    - paragraph [ref=f5e230]: Class Participation (including reading assignment checks) (15%)
                    - paragraph [ref=f5e231]: Students will be expected to participate in class discussions. Willingness to participate, participation and communication style, and content will be assessed on an ongoing basis. Participation will also be assessed by four (4) unscheduled assessments based on assigned readings.
