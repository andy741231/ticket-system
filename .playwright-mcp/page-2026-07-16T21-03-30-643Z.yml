                    - paragraph [ref=f5e127]: "POPH 2300: INTRODUCTION TO POPULATION HEALTH"
                    - paragraph [ref=f5e128]: University of Houston
                    - paragraph [ref=f5e129]: Fall Semester 2025
                    - paragraph [ref=f5e130]
                    - paragraph [ref=f5e131]
                    - paragraph [ref=f5e132]: "Instructor of Record: Marino A. Bruce, PhD, MSRC, MDiv"
                    - paragraph [ref=f5e133]: "Co-Instructor: Kiara Spooner, DrPH, MPH"
                    - paragraph [ref=f5e134]: Monday/Wednesday 4-5:30pm, 43 Fred J. Heyne Building
                    - paragraph [ref=f5e135]: "Office: 6025 Health 2 Building"
                    - paragraph [ref=f5e136]: "Office Hours: Virtual: 3-4 Wednesday, In person: by appointment"
                    - paragraph [ref=f5e137]:
                      - text: "Email:"
                      - link "mabruce@central.uh.edu" [ref=f5e138] [cursor=pointer]:
