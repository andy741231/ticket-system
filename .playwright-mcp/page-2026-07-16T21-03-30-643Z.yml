                  - paragraph [ref=f5e430]: SECURITY ESCORTS AND COUGAR RIDE
                  - paragraph [ref=f5e431]:
                    - generic [ref=f5e432]:
                      - text: UHPD continually works with the University community to make the
                      - mark [ref=f5e433]: camp
                      - text: us a safe place to learn, work, and live. The security escort service is designed for the community members who have safety concerns and would like to have a Security Officer walk with them, for their safety, as they make their way across
                      - mark [ref=f5e434]: camp
                      - text: us. Based on availability either a UHPD Security Officer or Police Officer will escort students, faculty, and staff to locations beginning and ending on
                      - mark [ref=f5e435]: camp
                      - text: us. If you feel that you need a Security Officer to walk with you for your safety, please call
                    - link "713-743-3333" [ref=f5e436] [cursor=pointer]:
                      - /url: tel:713-743-3333
                    - text: . Arrangements may be made for special needs.
                  - paragraph [ref=f5e437]:
