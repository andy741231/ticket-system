                    - paragraph [ref=f5e292]: Extra credit is a privilege that the class has to earn. There might be opportunities in the course, depending on whether you deserve them or not. I will make that determination. Please do not ask for individualized extra credit opportunities.
                    - paragraph [ref=f5e293]
                    - paragraph [ref=f5e294]: COURSE PROTOCOLS
                    - paragraph [ref=f5e295]
                    - paragraph [ref=f5e296]: "Rule 1: Read the syllabus carefully. The syllabus is a social contract between the instructor and students. Questions about subjects covered by the syllabus are welcome; however, please carefully read the syllabus and make a point of reviewing it over the course of the semester."
                    - paragraph [ref=f5e297]
                    - paragraph [ref=f5e298]:
                      - text: "Rule 2: Valid email address. The University of Houston considers your email address in PeopleSoft the official method of contact between you and the University. As a prerequisite of this course, you must have a valid email address in PeopleSoft. Please check and use your Cougarnet email for communications related to this course. Faculty use the Cougarnet email to respond to course-related inquiries such as grade queries or progress reports for reasons of FERPA. To access your Cougarnet email,"
                      - link "login" [ref=f5e299] [cursor=pointer]:
                        - /url: https://uh.edu/infotech/services/office365/how-to-login/
                      - text: to your Microsoft 365 account with your Cougarnet credentials. Visit
                      - link "University Information Technology (UIT)" [ref=f5e300] [cursor=pointer]:
                        - /url: https://uh.edu/infotech/services/accounts/email/email-faq/
                      - text: for instructions on how to connect your Cougarnet e-mail on a mobile device. You may not claim an incorrect or blank email address as an excuse in the case of missed communications from the professor or staff.
                    - paragraph [ref=f5e301]
                    - paragraph [ref=f5e302]: "Rule 3: Schedules. Remember that this is a structured course. If you cannot meet the deadlines, you should not be in this class. Review these deadlines and scheduled events carefully. You must do the assigned work during the semester on time. Please review Rule 1."
                    - paragraph [ref=f5e303]
                    - paragraph [ref=f5e304]: "Rule 4: Computer equipment. There will be online quizzes and study assignments. The class staff cannot make special arrangements to deliver the material to you. If you have a computer problem, you should have your computer repaired, if that is necessary, or contact the University IT Help Desk at 713-743-1411, or visit them at Tech Commons behind M.D. Anderson Library. Technology is not foolproof, so please give yourself enough time to complete your work on time."
                    - paragraph [ref=f5e305]
                    - paragraph [ref=f5e306]: "Rule 5: Missed internet assignments. If you do not complete an online assignment by the date and time, you will not be allowed to make up the assignment. Your grade for that assignment will be zero. There are no exceptions to this rule."
                    - paragraph [ref=f5e307]
                    - paragraph [ref=f5e308]: "Rule 6: Posting Grades. Grades will be posted on the CANVAS site."
                    - paragraph [ref=f5e309]
                    - paragraph [ref=f5e310]: "Rule 7: Dropping the course. You may drop or withdraw without a grade up until the official university reporting date (ORD). If you drop the course after that, you must receive a grade, or take a “W.” Please consult the academic calendar for the last day to drop a course with a grade or withdraw with a “W.”"
                    - paragraph [ref=f5e311]
                    - paragraph [ref=f5e312]:
                      - text: "Rule 8: Communication. Email communication related to this course will be sent to your UH email account. The email server can be accessed via Outlook, which provides a single location for organizing and managing day-to-day information, from email and calendars to contacts and task lists. Email accounts can be accessed by logging into Office 365 with your Cougarnet credentials or through Access UH. They can also be configured on"
                      - link "IOS" [ref=f5e313] [cursor=pointer]:
                        - /url: https://uhlcithelp.zendesk.com/hc/en-us/articles/360038912674-Configuring-Office-365-Exchange-Email-using-IOS-Mobile-Devices
                      - text: and
                      - link "Android" [ref=f5e314] [cursor=pointer]:
                        - /url: https://uhlcithelp.zendesk.com/hc/en-us/articles/360039412873-Configuring-Exchange-Email-Android-Mobile-Device
                      - text: mobile devices. Additional assistance can be found at the
                      - link "Get Help" [ref=f5e315] [cursor=pointer]:
                        - /url: https://uh.edu/infotech/help/
                      - text: page. You will be responsible for checking your email regularly for class updates and announcements. You may email me at any time regarding procedural issues. If I have not responded within 72 hours, email me again. Sometimes, emails are blocked by spam filters. For substantive concerns, please schedule an appointment to see me.
                    - paragraph [ref=f5e316]
                    - paragraph [ref=f5e317]: "Rule 9: Dropping you from the course. If we believe that you are not actively engaged in the class (i.e., you are missing assignments, exams, or are failing to respond to communications) we reserve the right to unilaterally drop you from the course. We don’t want to do this, so please make sure to give this course your full effort."
                    - paragraph [ref=f5e318]
                    - paragraph [ref=f5e319]: USE OF AI LARGE LANGUAGE MODELS (FROM THE UH LAW CENTER)
                    - paragraph [ref=f5e320]: Generative artificial intelligence is a form of machine learning that creates new and original output based on the data it has been trained on or has access to, employing algorithms to generate content in response to prompts. Examples of the technology include what are known as generative “large language models” (LLMs). Two well-known LLM implementations are ChatGPT and Claude. LLM output can include text, images, music, code, and more. This syllabus policy covers the textual output of generative LLMs (AI-Generated Work Product). Because AI-Generated Work Product can often mimic human intelligence, it could potentially be used as a substitute for a student’s own work product. Such use is potentially problematic to the extent that it becomes a substitute for internalized student understanding of the material or creates a dependency on AI-Generated Work Product. Subject to the exceptions immediately below, your continuing enrollment in this course constitutes your pledge not to generate or to use any AI-Generated Work Product—whether from yourself or others—in relation to any assessment in this course. The term “assessment” means any graded or ungraded work product for this course that is submitted to the instructor, presented in a class session, or used in an oral or written graded assessment for this course.
                    - paragraph [ref=f5e321]
                    - paragraph [ref=f5e322]
                    - paragraph [ref=f5e323]: "Exceptions:"
                    - paragraph [ref=f5e324]: "- You may generate and use AI-Generated Work Product for class preparation, although you must disclose the full extent of that use if your instructor asks. You may generate and use AI-Generated Work Product for study supplements to aid with general understanding of course content."
                    - paragraph [ref=f5e325]
                    - paragraph [ref=f5e326]: "- You may generate and use AI-Generated Work Product for an outline that summarizes the course content."
                    - paragraph [ref=f5e327]
                    - paragraph [ref=f5e328]: "- You may use AI-Generated Work Product to check your originally drafted text for misspellings, grammar and punctuation errors, strength and clarity of prose, verbosity, effective transitional language and thesis sentences, word choice, excessive passive voice, and like things."
                    - paragraph [ref=f5e329]
                    - paragraph [ref=f5e330]: "- You may use AI-Generated Work Product for the purpose of language translation"
