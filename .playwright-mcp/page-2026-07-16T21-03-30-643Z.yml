                    - paragraph [ref=f5e139]: "Phone: 713-743-5953"
                    - paragraph [ref=f5e140]
                    - paragraph [ref=f5e141]: COURSE DESCRIPTION
                    - paragraph [ref=f5e142]: This course is an introduction to how the multiple determinants of health (e.g., health care, socioeconomic status, genetics, the physical environment and health behavior, and their interactions) have implications for the health outcomes of populations. Characteristics of populations defined by geography, diagnosis, and/or point of care will be discussed, including avenues in which health care systems, public health agencies, community-based organizations, and retail health organizations work together to improve local, national, and global communities. Students will also learn how to view problems from a population health and population health management perspective. Descriptions of how clinical and non-clinical data are used to measure health-related outcomes, analyze patterns, communicate results, and develop evidence-based intervention practices to the management of health populations will be explored.
                    - paragraph [ref=f5e143]
                    - paragraph [ref=f5e144]: LEARNING OUTCOMES
                    - paragraph [ref=f5e145]: "Upon completion of this course, students will be able to:"
                    - paragraph [ref=f5e146]
                    - paragraph [ref=f5e147]: Define population health, population health science, population health management, and differentiate population health science from related disciplines.
                    - paragraph [ref=f5e148]: Explain the historical origins and foundational principles of population health science.
                    - paragraph [ref=f5e149]: Explain the interdisciplinary nature of population health science.
                    - paragraph [ref=f5e150]: Develop population health-related policy
                    - paragraph [ref=f5e151]: reviews
                    - paragraph [ref=f5e152]: .
                    - paragraph [ref=f5e153]: Identify the key issues facing the U.S. health care system and discuss the importance of the population health approach to improving health outcomes.
                    - paragraph [ref=f5e154]: Discuss medical and non-medical determinants of the health of a population and their relative importance.
                    - paragraph [ref=f5e155]: Describe
                    - paragraph [ref=f5e156]: the elements of a Health Impact Assessment.
                    - paragraph [ref=f5e157]: Present results from a Health Impact Assessment using multiple platforms.
                    - paragraph [ref=f5e158]
