                  - paragraph [ref=f5e410]: MENTAL HEALTH AND WELLNESS RESOURCES
                  - paragraph [ref=f5e411]:
                    - text: The University of Houston has a number of resources to support students’ mental health and overall wellness, including
                    - link "CoogsCARE" [ref=f5e412] [cursor=pointer]:
                      - /url: https://uh.edu/coogs-care/
                    - text: and the
                    - link "UH Go App" [ref=f5e413] [cursor=pointer]:
                      - /url: https://uh.edu/go/
                    - text: . UH
                    - link "Counseling and Psychological Services (CAPS)" [ref=f5e414] [cursor=pointer]:
                      - /url: https://uh.edu/caps/services/
                    - text: offers 24/7 mental health support for all students, addressing various concerns like stress, college adjustment and sadness. CAPS provides individual and couples counseling, group therapy, workshops and connections to other support services on and
                    - generic [ref=f5e415]:
                      - text: off-
                      - mark [ref=f5e416]: camp
                      - text: us
                    - text: . For assistance visit
                    - link "uh.edu/caps" [ref=f5e417] [cursor=pointer]:
                      - /url: https://uh.edu/caps/
                    - text: ", call 713-743-5454, or visit a"
                    - link "Let’s Talk" [ref=f5e418] [cursor=pointer]:
                      - /url: https://www.uh.edu/caps/outreach/lets-talk/
                    - text: location in-person or virtually.
                    - link "Let’s Talk" [ref=f5e419] [cursor=pointer]:
                      - /url: https://www.uh.edu/caps/outreach/lets-talk/
                    - text: are daily, informal confidential consultations with CAPS therapists where no appointment or paperwork is needed.
                  - paragraph [ref=f5e420]
                  - paragraph [ref=f5e421]:
                    - text: The
                    - link "Student Health Center" [ref=f5e422] [cursor=pointer]:
                      - /url: https://uh.edu/healthcenter/services/medical-services/psychiatry-clinic/
                    - text: offers a Psychiatry Clinic for enrolled UH students. Call 713-743-5149 during clinic hours, Monday through Friday 8 a.m. - 4:30 p.m. to schedule an appointment.
                  - paragraph [ref=f5e423]
